- name: Check the vars preference
  hosts: local
  connection: local
  become: yes
  vars:
    NAME: "Ansible from Playbook level"
  vars_files:
    - details.yaml
  vars_prompt:
    name: NAME
    prompt: Please enter your prompt message
    private: false
  tasks:
    - name: "Print the variable from task level"
      vars:
        NAME: "Ansible from Task level"
      ansible.builtin.debug:
        msg: "Hi {{ NAME }}"

# Variables preference or precedence:

# 1. If you pass the variables as arguments on CLI, in the first preference these CLI arguments are called.
# 2. Task level variables will be called in the next priority.
# 3. File level variables will be called in the next priority.
# 4. Prompt level variables will be called in the next priority.
# 5. Playbook level variables will be called in the next priority.
# 6. Inventory level variables will be called in the next priority.